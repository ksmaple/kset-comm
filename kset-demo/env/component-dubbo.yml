# Dubbo 组件配置

# 来源：Apache Dubbo 原生配置。
# 说明：引入 kset-starter-dubbo 后，以下基础项会由 starter 自动按 spring.application.name 与 Nacos 地址补齐。
# 非必选项：需要覆盖默认 Dubbo 行为时再打开。
# dubbo:
#   application:
#     name: ${spring.application.name}
#   protocol:
#     name: dubbo
#     port: -1
#   registry:
#     address: nacos://${NACOS_ADDR:127.0.0.1:8848}
#     register-mode: instance
#   consumer:
#     check: false

# 来源：KSet Cloud Dubbo 扩展。
# 非必选项：默认启用 trace 透传与灰度路由。
# kset:
#   cloud:
#     dubbo:
#       trace-propagation-enabled: true
#       gray-enabled: true
#       gray-metadata-key: version
#       default-gray-tag: stable
