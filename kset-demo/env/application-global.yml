# KSet Demo 全局覆盖配置
# 用途：所有 demo 场景共用的全局配置；组件配置通过 component-*.yml 按需叠加。

# 来源：Spring Boot ServerProperties。
server:
  # 含义：HTTP 监听端口；不同 demo 可通过命令行覆盖。
  port: 8080

# 来源：Spring Boot / Spring Framework 原生配置。
spring:
  profiles:
    # 来源：Spring Profiles。
    # 含义：启用 local 本地环境 profile。
    active: local
  application:
    # 来源：Spring Boot ApplicationProperties。
    # 含义：应用名；KSet 会据此派生 Redis key 前缀、CAT domain、Dubbo 应用名等默认值。
    name: kset-local-demo

# 来源：Spring Boot LoggingSystem。
# 非必选项：需要覆盖日志级别或日志目录时再打开。
# logging:
#   level:
#     root: INFO
#     com.kset: DEBUG
#   file:
#     path: tmp/logs
