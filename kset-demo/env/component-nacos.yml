# Nacos 组件配置

# 来源：Spring Cloud Alibaba Nacos Discovery / Config。
spring:
  cloud:
    nacos:
      discovery:
        # 含义：服务注册发现使用的本地 Nacos 地址。
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        # 非必选项：KSet Nacos starter 默认补齐 dev / KSET_GROUP。
        # namespace: dev
        # group: KSET_GROUP
        # username: nacos
        # password: nacos
        # register-enabled: true
        # ephemeral: true
        # heart-beat-interval: 5000
        # heart-beat-timeout: 15000
        # ip-delete-timeout: 30000
      config:
        # 含义：配置中心使用的本地 Nacos 地址。
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        # 非必选项：KSet Nacos starter 默认补齐 dev / KSET_GROUP。
        # namespace: dev
        # group: KSET_GROUP
        # file-extension: yaml
        # username: nacos
        # password: nacos
        # refresh-enabled: true
        # timeout: 3000
        # max-retry: 3
        # config-retry-time: 2000
        # enable-remote-sync-config: false

  # 来源：Spring Boot ConfigData / Spring Cloud Alibaba Nacos Config。
  # 含义：Nacos Config 要求 spring.config.import 包含 nacos: 条目；optional 表示配置不存在时不阻断启动。
  config:
    import:
      - optional:nacos:kset-common.yaml
      - optional:nacos:${spring.application.name}.yaml
