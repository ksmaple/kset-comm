# RocketMQ 组件配置

# 来源：RocketMQ V5 Client Spring Boot Starter 原生配置。
rocketmq:
  producer:
    # 含义：RocketMQ 5 Proxy gRPC 接入地址；本地 env/docker-compose.yml 默认暴露 127.0.0.1:8081。
    endpoints: ${ROCKETMQ_ENDPOINTS:127.0.0.1:8081}
    # 含义：生产者预取路由的默认 Topic；业务可按实际消息主题覆盖。
    topic: ${ROCKETMQ_TOPIC:${spring.application.name}-topic}
    # 非必选项：请求超时时间，单位秒；默认 3。
    # request-timeout: 3
    # 非必选项：消息发送最大尝试次数；默认 3。
    # max-attempts: 3
    # 非必选项：本地开发默认不开 TLS；云厂商或公网代理按实际要求打开。
    ssl-enabled: false
    # 非必选项：命名空间。
    # namespace:
    # 非必选项：ACL 访问密钥。
    # access-key:
    # secret-key:
  # 非必选项：SimpleConsumer 默认配置；实际 group/topic 可按业务消费模型配置。
  # simple-consumer:
  #   endpoints: ${ROCKETMQ_ENDPOINTS:127.0.0.1:8081}
  #   consumer-group: ${spring.application.name}-consumer
  #   topic: ${ROCKETMQ_TOPIC:${spring.application.name}-topic}
  #   tag: "*"
  #   ssl-enabled: false

# KSet MQ Starter 不要求在配置文件声明事件门面参数。
# 使用方式：
# - 注解式：在事件类上使用 @KsetMqEvent(topic = "...", tag = "...") 指定发送元数据。
# - 编程式：注入 RocketMqEventOperations；可调用 publish(event) 使用默认 Topic，也可调用 publish(topic, tag, event) 显式发送。
# - 默认：直接使用 EventFacade 时复用 rocketmq.producer.topic；未配置 topic 时使用 ${spring.application.name}-event。
