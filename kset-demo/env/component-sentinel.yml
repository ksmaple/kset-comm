# Sentinel 组件配置

# 来源：KSet Sentinel Starter / Sentinel Nacos datasource。
# 说明：引入 kset-starter-sentinel 后默认按 spring.application.name 派生规则 dataId。
# 非必选项：需要覆盖规则 dataId 时再打开。
# kset:
#   cloud:
#     sentinel:
#       enabled: true
#       flow-rule-data-id: ${spring.application.name}-flow-rules
#       degrade-rule-data-id: ${spring.application.name}-degrade-rules
#       param-flow-rule-data-id: ${spring.application.name}-param-flow-rules
#       gateway-flow-rule-data-id: ${spring.application.name}-gateway-flow-rules

# 来源：Spring Cloud Alibaba Sentinel 原生配置。
# 非必选项：需要接入 Sentinel Dashboard 或自定义传输端口时再打开。
# spring:
#   cloud:
#     sentinel:
#       enabled: true
#       eager: true
#       transport:
#         dashboard: 127.0.0.1:8858
#         port: 8719
#         client-ip:
#       filter:
#         enabled: true
