spring:
  application:
    name: demo-gateway
  profiles:
    active: local
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      config:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
  config:
    import:
      - optional:nacos:kset-common.yaml
      - optional:nacos:${spring.application.name}.yaml

server:
  port: 8080

kset:
  monitor:
    backend: cat
    cat:
      initialize: true
