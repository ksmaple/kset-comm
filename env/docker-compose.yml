services:
  nacos:
    image: ${NACOS_IMAGE:-nacos/nacos-server:v3.2.0}
    container_name: kset-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_ENABLE: "false"
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN:-a3NldC1sb2NhbC1uYWNvcy1hdXRoLXRva2VuLWNoYW5nZS1tZS0zMi1ieXRlcw==}
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY:-kset-local-nacos}
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_IDENTITY_VALUE:-kset-local-nacos}
      JVM_XMS: 256m
      JVM_XMX: 512m
      JVM_XMN: 128m
    ports:
      - "${NACOS_CONSOLE_PORT:-8080}:8080"
      - "${NACOS_HTTP_PORT:-8848}:8848"
      - "${NACOS_GRPC_PORT:-9848}:9848"
      - "${NACOS_RAFT_PORT:-9849}:9849"
    volumes:
      - /data/nacos/data:/home/nacos/data
      - /data/nacos/logs:/home/nacos/logs
    networks:
      - kset-env

  postgres:
    image: ${POSTGRES_IMAGE:-pgvector/pgvector:0.8.2-pg17}
    container_name: kset-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kset_demo}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      TZ: Asia/Shanghai
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - /data/postgres:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-kset_demo}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - kset-env

  redis:
    image: ${REDIS_IMAGE:-redis:7.4.9-alpine}
    container_name: kset-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - /data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - kset-env

  rocketmq-namesrv:
    image: ${ROCKETMQ_IMAGE:-apache/rocketmq:5.5.0}
    container_name: kset-rocketmq-namesrv
    restart: unless-stopped
    # RocketMQ 官方镜像默认使用 uid=3000，Docker 自动创建的 /data 挂载目录通常归 root。
    # 本地环境以 root 启动，避免日志目录和存储目录无写权限导致服务静默退出。
    user: "0:0"
    command: ["sh", "/home/rocketmq/rocketmq-${ROCKETMQ_VERSION:-5.5.0}/bin/mqnamesrv"]
    ports:
      - "${ROCKETMQ_NAMESRV_PORT:-9876}:9876"
    volumes:
      - /data/rocketmq/namesrv/logs:/home/rocketmq/logs
    healthcheck:
      test: ["CMD-SHELL", "sh /home/rocketmq/rocketmq-${ROCKETMQ_VERSION:-5.5.0}/bin/mqadmin clusterList -n 127.0.0.1:9876 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - kset-env

  rocketmq-broker:
    image: ${ROCKETMQ_IMAGE:-apache/rocketmq:5.5.0}
    container_name: kset-rocketmq-broker
    restart: unless-stopped
    # 同 namesrv，确保 broker 能写入 /data/rocketmq/broker/logs 与 store。
    user: "0:0"
    depends_on:
      rocketmq-namesrv:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        cp /home/rocketmq/broker.conf /tmp/broker.conf
        sed -i "s/^brokerIP1=.*/brokerIP1=${ROCKETMQ_BROKER_IP:-127.0.0.1}/" /tmp/broker.conf
        sh /home/rocketmq/rocketmq-${ROCKETMQ_VERSION:-5.5.0}/bin/mqbroker --enable-proxy -c /tmp/broker.conf
    environment:
      NAMESRV_ADDR: rocketmq-namesrv:9876
      JAVA_OPT_EXT: "-Drocketmq.brokerIP1=${ROCKETMQ_BROKER_IP:-127.0.0.1}"
    ports:
      - "${ROCKETMQ_BROKER_PORT:-10911}:10911"
      - "${ROCKETMQ_BROKER_FAST_PORT:-10909}:10909"
      - "${ROCKETMQ_PROXY_GRPC_PORT:-8081}:8081"
      - "${ROCKETMQ_PROXY_REMOTING_PORT:-18080}:8080"
    volumes:
      - /data/rocketmq/broker/logs:/home/rocketmq/logs
      - /data/rocketmq/broker/store:/home/rocketmq/store
      - ./rocketmq/broker.conf:/home/rocketmq/broker.conf
    healthcheck:
      test: ["CMD-SHELL", "sh /home/rocketmq/rocketmq-${ROCKETMQ_VERSION:-5.5.0}/bin/mqadmin brokerStatus -n rocketmq-namesrv:9876 -b 127.0.0.1:10911 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - kset-env

networks:
  kset-env:
    name: kset-env
